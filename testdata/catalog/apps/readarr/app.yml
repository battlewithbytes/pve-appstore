id: readarr
name: Readarr
description: Book and audiobook collection manager for Usenet and BitTorrent with automatic downloading and library organization.
overview: |
  Readarr is a book collection manager that automatically searches for, downloads, and organizes
  your ebook and audiobook library. It monitors RSS feeds and integrates with Usenet and torrent
  indexers through Prowlarr or Jackett to find new releases.

  Features include automatic library scanning, metadata fetching from Goodreads and other sources,
  quality profiles for preferred formats, rename rules, failed download handling, and manual
  search for individual books or authors.

  Built on the Servarr platform (.NET), Readarr currently uses the develop branch as there is
  no stable release yet. After installation, access the WebUI to configure your root folders,
  indexers, and download clients.
version: "0.4.5"
categories:
  - media
tags:
  - books
  - ebooks
  - audiobooks
  - servarr
homepage: https://readarr.com
license: GPL-3.0
maintainers:
  - PVE App Store

official: true
lxc:
  ostemplate: debian-12
  defaults:
    unprivileged: true
    cores: 1
    memory_mb: 512
    disk_gb: 4
    features:
      - nesting
    onboot: true

volumes:
  - name: books
    type: bind
    mount_path: /books
    label: Books Library
    default_host_path: /mnt/storage/books
    required: false
    description: Root folder for your book library

inputs:
  - key: webui_port
    label: WebUI Port
    type: number
    default: 8787
    required: false
    group: Network
    description: Port for the Readarr web interface.
    help: Default 8787; must be between 1024-65535
    validation:
      min: 1024
      max: 65535

permissions:
  packages:
    - curl
    - sqlite3
    - libicu72
  urls:
    - "https://readarr.servarr.com/*"
    - "http://127.0.0.1:*"
  paths:
    - "/opt/Readarr/"
    - "/var/lib/readarr/"
    - "/etc/systemd/system/"
    - "/books/"
    - "/tmp/"
  services:
    - readarr
  users:
    - readarr
  commands:
    - tar
    - chmod
    - ln

provisioning:
  script: provision/install.py
  timeout_sec: 300

outputs:
  - key: webui_url
    label: WebUI
    value: "http://{{ip}}:{{webui_port}}"

gpu:
  supported: []
  required: false
