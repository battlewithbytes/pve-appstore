<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <rect width="256" height="256" rx="32" fill="#1a1a2e"/>
  <rect x="16" y="16" width="224" height="224" rx="24" fill="#16213e" stroke="#0f3460" stroke-width="2"/>
  <!-- Circuit board traces -->
  <line x1="40" y1="128" x2="80" y2="128" stroke="#00b4d8" stroke-width="3" stroke-linecap="round"/>
  <line x1="176" y1="128" x2="216" y2="128" stroke="#00b4d8" stroke-width="3" stroke-linecap="round"/>
  <line x1="128" y1="40" x2="128" y2="80" stroke="#00b4d8" stroke-width="3" stroke-linecap="round"/>
  <line x1="128" y1="176" x2="128" y2="216" stroke="#00b4d8" stroke-width="3" stroke-linecap="round"/>
  <!-- Diagonal traces -->
  <line x1="60" y1="60" x2="88" y2="88" stroke="#00b4d8" stroke-width="2" stroke-linecap="round"/>
  <line x1="168" y1="60" x2="196" y2="88" stroke="#00b4d8" stroke-width="2" stroke-linecap="round" transform="rotate(90 182 74)"/>
  <line x1="60" y1="196" x2="88" y2="168" stroke="#00b4d8" stroke-width="2" stroke-linecap="round"/>
  <line x1="196" y1="196" x2="168" y2="168" stroke="#00b4d8" stroke-width="2" stroke-linecap="round"/>
  <!-- IC chip body -->
  <rect x="80" y="80" width="96" height="96" rx="8" fill="#0f3460" stroke="#00b4d8" stroke-width="2.5"/>
  <!-- Chip pins -->
  <rect x="92" y="74" width="8" height="12" rx="1" fill="#00b4d8"/>
  <rect x="112" y="74" width="8" height="12" rx="1" fill="#00b4d8"/>
  <rect x="132" y="74" width="8" height="12" rx="1" fill="#00b4d8"/>
  <rect x="152" y="74" width="8" height="12" rx="1" fill="#00b4d8"/>
  <rect x="92" y="170" width="8" height="12" rx="1" fill="#00b4d8"/>
  <rect x="112" y="170" width="8" height="12" rx="1" fill="#00b4d8"/>
  <rect x="132" y="170" width="8" height="12" rx="1" fill="#00b4d8"/>
  <rect x="152" y="170" width="8" height="12" rx="1" fill="#00b4d8"/>
  <rect x="74" y="92" width="12" height="8" rx="1" fill="#00b4d8"/>
  <rect x="74" y="112" width="12" height="8" rx="1" fill="#00b4d8"/>
  <rect x="74" y="132" width="12" height="8" rx="1" fill="#00b4d8"/>
  <rect x="74" y="152" width="12" height="8" rx="1" fill="#00b4d8"/>
  <rect x="170" y="92" width="12" height="8" rx="1" fill="#00b4d8"/>
  <rect x="170" y="112" width="12" height="8" rx="1" fill="#00b4d8"/>
  <rect x="170" y="132" width="12" height="8" rx="1" fill="#00b4d8"/>
  <rect x="170" y="152" width="12" height="8" rx="1" fill="#00b4d8"/>
  <!-- MM text on chip -->
  <text x="128" y="138" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="28" fill="#00FF9D">MM</text>
  <!-- Corner nodes -->
  <circle cx="40" cy="40" r="5" fill="#00b4d8"/>
  <circle cx="216" cy="40" r="5" fill="#00b4d8"/>
  <circle cx="40" cy="216" r="5" fill="#00b4d8"/>
  <circle cx="216" cy="216" r="5" fill="#00b4d8"/>
</svg>
